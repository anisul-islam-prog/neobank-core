# Test configuration for Auth module
spring.datasource.url=jdbc:tc:postgresql:17-alpine:///auth_test
spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver
spring.datasource.username=test
spring.datasource.password=test

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Test Configuration
jwt.secret=testSecretKeyForDevelopmentMustBe32CharsOrMore
jwt.expiration=3600000
jwt.audience=test

# Disable security during tests
spring.security.user.name=test
spring.security.user.password=test

# Logging
logging.level.com.neobank.auth=DEBUG
logging.level.org.testcontainers=INFO
logging.level.org.springframework.security=INFO
