spring:
  datasource:
    url: jdbc:tc:postgresql:17-alpine:///auth_test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: test
    password: test
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
  security:
    user:
      name: test
      password: test

jwt:
  secret: testSecretKeyForDevelopmentMustBe32CharsOrMore
  expiration: 3600000
  audience: test

logging:
  level:
    com.neobank.auth: DEBUG
    org.testcontainers: INFO
    org.springframework.security: INFO
