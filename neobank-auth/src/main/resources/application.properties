# NeoBank Auth Service Configuration
# Port: 8081

# Server Configuration
server.port=8081

# Virtual Threads
spring.threads.virtual.enabled=true

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/neobank
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=true

# Liquibase
spring.liquibase.change-log=classpath:db/changelog/auth-changelog.xml
spring.liquibase.enabled=true

# JWT Configuration
neobank.auth.jwt.secret=${JWT_SECRET:default-secret-change-in-production}
neobank.auth.jwt.expiration=3600000
neobank.auth.jwt.refresh-expiration=604800000

# Security
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8081
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8081/.well-known/jwks.json

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://localhost:4318/v1/traces

# Logging
logging.level.com.neobank.auth=INFO
logging.level.org.springframework.security=DEBUG

# Profile
spring.profiles.active=local
