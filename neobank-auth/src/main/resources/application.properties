# NeoBank Auth Module Configuration
spring.application.name=neobank-auth

# Database Schema - schema_auth
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/neobank}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# Schema-specific configuration
spring.jpa.properties.hibernate.default_schema=schema_auth
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
neobank.jwt.secret=${JWT_SECRET:your-secret-key-change-in-production}
neobank.jwt.expiration=${JWT_EXPIRATION:86400000}

# BCrypt Configuration
neobank.password.strength=${PASSWORD_STRENGTH:12}

# Observability — Micrometer & OpenTelemetry
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://otel-collector:4318/v1/traces
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
