# NeoBank Lending — Demo Profile
spring.datasource.url: jdbc:postgresql://localhost:5432/neobank
spring.datasource.username: postgres
spring.datasource.password: postgres
spring.jpa.hibernate.ddl-auto: update
spring.jpa.show-sql: false
spring.jpa.properties.hibernate.format_sql: true
spring.jpa.properties.hibernate.default_schema: schema_loans
spring.jpa.open-in-view: false
spring.liquibase.enabled: false
# Spring AI — use Ollama for free demo
spring.ai.openai.api-key: sk-demo-placeholder
spring.ai.ollama.chat.enabled: true
spring.ai.ollama.base-url: http://localhost:11434
spring.ai.ollama.chat.model: llama3.2
logging.level.com.neobank.loans: INFO
logging.level.root: INFO
management.tracing.enabled: true
management.tracing.sampling.probability: 1.0
management.endpoints.web.exposure.include: health,info,prometheus,metrics
management.endpoint.health.show-details: always
# Demo seed data
neobank.demo.seed.enabled: true
neobank.demo.seed.loans: 15
