# NeoBank Lending Module Configuration
spring.application.name=neobank-lending

# Database Schema - schema_loans
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/neobank}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# Schema-specific configuration
spring.jpa.properties.hibernate.default_schema=schema_loans
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Spring AI Configuration (for fraud detection in loan applications)
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.ollama.base-url=${SPRING_AI_OLLAMA_BASE_URL:http://localhost:11434}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Observability — Micrometer & OpenTelemetry
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://otel-collector:4318/v1/traces
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
