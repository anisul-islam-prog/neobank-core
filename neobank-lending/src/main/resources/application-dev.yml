# NeoBank Lending — Dev Profile
spring.devtools.restart.enabled: true
spring.devtools.livereload.enabled: true
spring.datasource.url: jdbc:postgresql://localhost:5432/neobank
spring.datasource.username: postgres
spring.datasource.password: postgres
spring.jpa.hibernate.ddl-auto: update
spring.jpa.show-sql: true
spring.jpa.properties.hibernate.format_sql: true
spring.jpa.properties.hibernate.default_schema: schema_loans
spring.jpa.open-in-view: false
spring.liquibase.enabled: false
# Spring AI — use Ollama for local dev (free, offline)
spring.ai.openai.api-key: sk-dev-placeholder
spring.ai.ollama.chat.enabled: true
spring.ai.ollama.base-url: http://localhost:11434
spring.ai.ollama.chat.model: llama3.2
logging.level.com.neobank.loans: DEBUG
logging.level.org.springframework.ai: DEBUG
logging.level.root: INFO
management.tracing.enabled: false
resilience4j.circuitbreaker.instances.loanProcessing.enabled: false
