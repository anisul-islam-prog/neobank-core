# Test configuration for Lending module
spring:
  main:
    allow-bean-definition-overriding: true
  datasource:
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  sql:
    init:
      mode: always
      data-locations: classpath:init-schema.sql
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        hbm2ddl:
          create_namespaces: true
  autoconfigure:
    exclude:
      - com.neobank.core.metrics.BankMetricsService

# Logging
logging:
  level:
    com.neobank.loans: DEBUG
    org.testcontainers: INFO
    org.springframework: INFO
