# NeoBank Analytics Module Configuration
spring.application.name=neobank-analytics
server.port=8084

# Database Schema - schema_analytics
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/neobank}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# Schema-specific configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=schema_analytics

# Spring Modulith
spring.modulith.events.republish-outstanding-events-on-restart=true

# Actuator for health checks
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://otel-collector:4318/v1/traces
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
