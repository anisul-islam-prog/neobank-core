# Test configuration for Analytics module
spring:
  datasource:
    url: jdbc:tc:postgresql:17-alpine:///analytics_test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: test
    password: test
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: schema_analytics

logging:
  level:
    com.neobank.analytics: DEBUG
    org.testcontainers: INFO
    org.springframework: INFO
