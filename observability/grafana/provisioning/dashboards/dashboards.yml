# Grafana Dashboard Provisioning

apiVersion: 1

providers:
  - name: 'NeoBank Dashboards'
    orgId: 1
    folder: 'NeoBank'
    folderUid: 'neobank'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
