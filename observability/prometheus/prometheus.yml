# Prometheus Configuration for NeoBank
# Scrapes metrics from all NeoBank modules via actuator endpoints

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'neobank-monitor'

scrape_configs:
  # NeoBank Backend (Gateway)
  # In production, add all service ports (8081-8088) as separate jobs
  - job_name: 'neobank-gateway'
    static_configs:
      - targets: ['backend:8080']
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Grafana metrics (port 3003 per docker-compose-monitoring.yml)
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3003']

  # OTel Collector internal metrics
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']

  # Tempo tracing backend
  - job_name: 'tempo'
    static_configs:
      - targets: ['tempo:3200']

  # Loki logging backend
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']
