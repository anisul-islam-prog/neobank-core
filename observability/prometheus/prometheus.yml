# Prometheus Configuration for NeoBank
# Scrapes metrics from all NeoBank modules via actuator endpoints

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'neobank-monitor'

scrape_configs:
  # NeoBank Backend (Gateway)
  - job_name: 'neobank-gateway'
    static_configs:
      - targets: ['backend:8080']
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Grafana metrics
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']

  # Tempo tracing backend
  - job_name: 'tempo'
    static_configs:
      - targets: ['tempo:3200']

  # Loki logging backend
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']
