name: Java CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      ollama:
        image: ollama/ollama:latest
        ports:
          - 11434:11434
        options: >-
          --health-cmd "ollama ps > /dev/null 2>&1 && ollama run llama3.2 'hello' > /dev/null 2>&1 || exit 1"
          --health-interval 30s
          --health-timeout 60s
          --health-retries 5
          --health-start-period 120s

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B clean compile

      - name: Run Tests with Ollama
        run: |
          export OLLAMA_BASE_URL=http://localhost:11434
          export FRAUD_TEST_USE_OPENAI=false
          mvn -B test

      - name: Generate Architecture Documentation
        run: mvn -B test -Dtest=ArchitectureDocumentationTest

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: target/surefire-reports/

      - name: Upload Architecture Docs
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: architecture-docs
          path: target/modulith-docs/
