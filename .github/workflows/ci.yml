name: Java CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      ollama:
        image: ollama/ollama:latest
        ports:
          - 11434:11434
        options: >-
          --health-cmd "ollama ps > /dev/null 2>&1 || exit 1"
          --health-interval 30s
          --health-timeout 60s
          --health-retries 5
          --health-start-period 120s

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B clean compile

      - name: Run All Backend Tests
        env:
          OLLAMA_BASE_URL: http://localhost:11434
          FRAUD_TEST_USE_OPENAI: "false"
          TESTCONTAINERS_RYUK_DISABLED: "true"
          TESTCONTAINERS_CHECKS_DISABLE: "true"
        run: mvn -B test

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: "**/target/surefire-reports/"
          retention-days: 7

  test-summary:
    runs-on: ubuntu-latest
    needs: build
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download Test Results
        uses: actions/download-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/

      - name: Generate Test Summary
        if: always()
        run: |
          echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          total=0
          failures=0
          errors=0
          skipped=0

          # Find all surefire XML reports
          shopt -s globstar
          for xml in test-results/**/*.xml; do
            [[ "$xml" == *"TEST-"* ]] || continue
            t=$(grep -oP 'tests="\K[0-9]+' "$xml" 2>/dev/null | head -1)
            f=$(grep -oP 'failures="\K[0-9]+' "$xml" 2>/dev/null | head -1)
            e=$(grep -oP 'errors="\K[0-9]+' "$xml" 2>/dev/null | head -1)
            s=$(grep -oP 'skipped="\K[0-9]+' "$xml" 2>/dev/null | head -1)
            total=$((total + ${t:-0}))
            failures=$((failures + ${f:-0}))
            errors=$((errors + ${e:-0}))
            skipped=$((skipped + ${s:-0}))
          done
          passed=$((total - failures - errors - skipped))

          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total   | $total |" >> $GITHUB_STEP_SUMMARY
          echo "| Passed  | $passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Failed  | $failures |" >> $GITHUB_STEP_SUMMARY
          echo "| Errors  | $errors |" >> $GITHUB_STEP_SUMMARY
          echo "| Skipped | $skipped |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Per-module breakdown
          echo "### Per-Module Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Module | Tests | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|--------|" >> $GITHUB_STEP_SUMMARY

          for mod in neobank-gateway neobank-auth neobank-onboarding neobank-core-banking neobank-lending neobank-cards neobank-batch neobank-analytics neobank-fraud; do
            mt=0; mf=0; me=0
            for xml in test-results/**/$mod/**/*.xml; do
              [[ "$xml" == *"TEST-"* ]] || continue
              t=$(grep -oP 'tests="\K[0-9]+' "$xml" 2>/dev/null | head -1)
              f=$(grep -oP 'failures="\K[0-9]+' "$xml" 2>/dev/null | head -1)
              e=$(grep -oP 'errors="\K[0-9]+' "$xml" 2>/dev/null | head -1)
              mt=$((mt + ${t:-0})); mf=$((mf + ${f:-0})); me=$((me + ${e:-0}))
            done
            if [ $mt -gt 0 ]; then
              if [ $((mf + me)) -gt 0 ]; then
                echo "| $mod | $mt | ❌ |" >> $GITHUB_STEP_SUMMARY
              else
                echo "| $mod | $mt | ✅ |" >> $GITHUB_STEP_SUMMARY
              fi
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          if [ $((failures + errors)) -gt 0 ]; then
            echo "❌ **Some tests failed** — check the logs above." >> $GITHUB_STEP_SUMMARY
          elif [ $total -eq 0 ]; then
            echo "⚠️ **No test results found** — artifact may be missing." >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **All $total tests passed**" >> $GITHUB_STEP_SUMMARY
          fi
