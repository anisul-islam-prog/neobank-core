name: Java CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      ollama:
        image: ollama/ollama:latest
        ports:
          - 11434:11434
        options: >-
          --health-cmd "ollama ps > /dev/null 2>&1 && ollama run llama3.2 'hello' > /dev/null 2>&1 || exit 1"
          --health-interval 30s
          --health-timeout 60s
          --health-retries 5
          --health-start-period 120s

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B clean compile

      - name: Run All Backend Tests
        run: |
          export OLLAMA_BASE_URL=http://localhost:11434
          export FRAUD_TEST_USE_OPENAI=false
          export TESTCONTAINERS_RYUK_DISABLED=true
          export TESTCONTAINERS_CHECKS_DISABLE=true

          # Run all tests across all modules in a single Maven invocation
          mvn -B clean test
        continue-on-error: false

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            neobank-*/target/surefire-reports/

  test-summary:
    runs-on: ubuntu-latest
    needs: build
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download Test Results
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: test-results/

      - name: Generate Test Summary
        run: |
          echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Parse surefire XML reports to count actual test results
          total=0
          passed=0
          failures=0
          errors=0
          skipped=0

          for xml in $(find test-results/ -name "TEST-*.xml" 2>/dev/null); do
            t=$(grep -oP 'tests="\K[0-9]+' "$xml" | head -1)
            f=$(grep -oP 'failures="\K[0-9]+' "$xml" | head -1)
            e=$(grep -oP 'errors="\K[0-9]+' "$xml" | head -1)
            s=$(grep -oP 'skipped="\K[0-9]+' "$xml" | head -1)
            total=$((total + ${t:-0}))
            failures=$((failures + ${f:-0}))
            errors=$((errors + ${e:-0}))
            skipped=$((skipped + ${s:-0}))
          done
          passed=$((total - failures - errors - skipped))

          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total Tests | $total |" >> $GITHUB_STEP_SUMMARY
          echo "| Passed | $passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Failed | $failures |" >> $GITHUB_STEP_SUMMARY
          echo "| Errors | $errors |" >> $GITHUB_STEP_SUMMARY
          echo "| Skipped | $skipped |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Per-module breakdown
          echo "### Per-Module Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Module | Tests | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|--------|" >> $GITHUB_STEP_SUMMARY

          for module_dir in neobank-gateway neobank-auth neobank-onboarding neobank-core-banking neobank-lending neobank-cards neobank-batch neobank-analytics neobank-fraud; do
            module_total=0
            module_failures=0
            module_errors=0
            for xml in $(find test-results/ -path "*/$module_dir/*" -name "TEST-*.xml" 2>/dev/null); do
              t=$(grep -oP 'tests="\K[0-9]+' "$xml" | head -1)
              f=$(grep -oP 'failures="\K[0-9]+' "$xml" | head -1)
              e=$(grep -oP 'errors="\K[0-9]+' "$xml" | head -1)
              module_total=$((module_total + ${t:-0}))
              module_failures=$((module_failures + ${f:-0}))
              module_errors=$((module_errors + ${e:-0}))
            done
            if [ $module_total -gt 0 ]; then
              if [ $((module_failures + module_errors)) -gt 0 ]; then
                status="❌"
              else
                status="✅"
              fi
              echo "| $module_dir | $module_total | $status |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          if [ $((failures + errors)) -gt 0 ]; then
            echo "❌ **Some tests failed**" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ **All tests passed**" >> $GITHUB_STEP_SUMMARY
          fi
