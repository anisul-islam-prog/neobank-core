# =============================================================================
# NeoBank - Production CI/CD Pipeline
# =============================================================================
# Stages: Build → Test → Docker → Security Scan → Push → Deploy (manual only)
# Triggered on: push to main (build/test/docker/scan/push), PRs to main (build/test)
# Deploy stage: available via workflow_dispatch with production choice only
# =============================================================================

name: NeoBank CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment for deployment'
        required: true
        default: 'production'
        type: choice
        options:
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  JAVA_VERSION: '21'
  MAVEN_OPTS: >-
    -DskipTests
    -Dmaven.wagon.http.retryHandler.count=3
    -Dmaven.wagon.httpconnectionManager.ttlSeconds=120

# ── Permissions ──────────────────────────────────────────────────────────────
permissions:
  contents: read
  packages: write
  security-events: write
  actions: read
  id-token: write

jobs:
  # ========================================================================
  # STAGE 1: Build & Test (Zero-Skip — tests MUST pass)
  # ========================================================================
  build-test:
    name: "Build & Test"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Compile (Quick Fail Check)
        run: mvn -B clean compile

      - name: Run All Tests (No Skip)
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/test
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          SPRING_AI_OPENAI_API_KEY: sk-test-placeholder
          TESTCONTAINERS_RYUK_DISABLED: "true"
          TESTCONTAINERS_CHECKS_DISABLE: "true"
        run: mvn -B clean install

      - name: Upload Test Results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: test-results
          path: "**/target/surefire-reports/"
          retention-days: 7

      - name: Upload Build Artifacts (JARs)
        uses: actions/upload-artifact@v5
        if: success()
        with:
          name: build-artifacts
          path: |
            **/target/*.jar
            **/target/*-exec.jar
          retention-days: 3

  # ========================================================================
  # STAGE 2: Build Docker Images (multi-stage, per-service — load only, no push)
  # ========================================================================
  # Images are loaded into the runner's local Docker daemon (load: true).
  # This enables Trivy to scan the local image *before* it is pushed to GHCR.
  # ========================================================================
  docker-build:
    name: "Docker Build — ${{ matrix.service.name }}"
    runs-on: ubuntu-latest
    needs: [ build-test ]
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: gateway,        dockerfile: docker/gateway/Dockerfile,       port: 8080 }
          - { name: auth,           dockerfile: docker/auth/Dockerfile,          port: 8081 }
          - { name: onboarding,     dockerfile: docker/onboarding/Dockerfile,    port: 8082 }
          - { name: core-banking,   dockerfile: docker/core-banking/Dockerfile,  port: 8083 }
          - { name: lending,        dockerfile: docker/lending/Dockerfile,       port: 8084 }
          - { name: cards,          dockerfile: docker/cards/Dockerfile,         port: 8085 }
          - { name: fraud,          dockerfile: docker/fraud/Dockerfile,         port: 8086 }
          - { name: batch,          dockerfile: docker/batch/Dockerfile,         port: 8087 }
          - { name: analytics,      dockerfile: docker/analytics/Dockerfile,     port: 8088 }

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-neobank-${{ matrix.service.name }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build Docker Image (load into local daemon)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: false
          load: true
          tags: ${{ matrix.service.name }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SERVICE_PORT=${{ matrix.service.port }}

  # ========================================================================
  # STAGE 3: Security Scan (Trivy vulnerability scan on local images)
  # ========================================================================
  # Scans the locally loaded image tag (e.g. analytics:latest) BEFORE push.
  # This eliminates the "manifest unknown" race condition.
  # ========================================================================
  security-scan:
    name: "Security Scan — ${{ matrix.service.name }}"
    runs-on: ubuntu-latest
    needs: [ docker-build ]
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: gateway }
          - { name: auth }
          - { name: onboarding }
          - { name: core-banking }
          - { name: lending }
          - { name: cards }
          - { name: fraud }
          - { name: batch }
          - { name: analytics }

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ matrix.service.name }}:latest'
          format: 'sarif'
          output: 'trivy-results-${{ matrix.service.name }}.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy Results to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results-${{ matrix.service.name }}.sarif'

      - name: Generate Scan Summary
        if: always()
        run: |
          echo "### Trivy Scan: ${{ matrix.service.name }}" >> $GITHUB_STEP_SUMMARY
          echo "Image: \`${{ matrix.service.name }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "Status: Scan completed. Check the Security tab for details." >> $GITHUB_STEP_SUMMARY

  # ========================================================================
  # STAGE 4: Push Docker Images to GHCR (only after Trivy confirms safe)
  # ========================================================================
  docker-push:
    name: "Docker Push — ${{ matrix.service.name }}"
    runs-on: ubuntu-latest
    needs: [ security-scan ]
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: gateway,        dockerfile: docker/gateway/Dockerfile,       port: 8080 }
          - { name: auth,           dockerfile: docker/auth/Dockerfile,          port: 8081 }
          - { name: onboarding,     dockerfile: docker/onboarding/Dockerfile,    port: 8082 }
          - { name: core-banking,   dockerfile: docker/core-banking/Dockerfile,  port: 8083 }
          - { name: lending,        dockerfile: docker/lending/Dockerfile,       port: 8084 }
          - { name: cards,          dockerfile: docker/cards/Dockerfile,         port: 8085 }
          - { name: fraud,          dockerfile: docker/fraud/Dockerfile,         port: 8086 }
          - { name: batch,          dockerfile: docker/batch/Dockerfile,         port: 8087 }
          - { name: analytics,      dockerfile: docker/analytics/Dockerfile,     port: 8088 }

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-neobank-${{ matrix.service.name }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SERVICE_PORT=${{ matrix.service.port }}

  # ========================================================================
  # STAGE 5: Deploy to Environment (MANUAL via workflow_dispatch only)
  # ========================================================================
  # NOTE: This stage is NOT triggered on push/PR. It only runs when you
  # manually dispatch the workflow and select an environment.
  # Requires: KUBE_CONFIG secret (base64-encoded kubeconfig)
  # ========================================================================
  deploy:
    name: "Deploy to ${{ inputs.environment }}"
    runs-on: ubuntu-latest
    needs: [ docker-push, security-scan ]
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 30
    environment:
      name: ${{ inputs.environment }}
      url: https://neobank.example.com

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Configure Kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
        shell: bash

      - name: Apply Kustomize Overlay
        run: |
          echo "Deploying NeoBank services to ${{ inputs.environment }}..."
          kubectl apply -k k8s/overlays/${{ inputs.environment }}

      - name: Wait for Critical Services
        run: |
          echo "Waiting for Auth service to be ready..."
          kubectl rollout status deployment/neobank-auth -n neobank --timeout=300s

          echo "Waiting for Core Banking service to be ready..."
          kubectl rollout status deployment/neobank-core-banking -n neobank --timeout=300s

      - name: Rolling Update Business Modules
        run: |
          SERVICES="neobank-onboarding neobank-lending neobank-cards neobank-fraud neobank-batch neobank-analytics neobank-gateway"
          for svc in $SERVICES; do
            echo "Rolling update: $svc"
            kubectl rollout status deployment/$svc -n neobank --timeout=300s || {
              echo "WARNING: $svc rollout timed out, continuing..."
            }
          done

      - name: Deployment Summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Images:** \`${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-neobank-*:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
