# =============================================================================
# NeoBank - Production CI/CD Pipeline
# =============================================================================
# Stages: Build → Test → Build/Scan/Push → Deploy (manual only)
# Triggered on: push to main (build/test/build-scan-push), PRs to main (build/test)
# Deploy stage: available via workflow_dispatch with production choice only
# =============================================================================

name: NeoBank CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment for deployment'
        required: true
        default: 'production'
        type: choice
        options:
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  JAVA_VERSION: '21'
  MAVEN_OPTS: >-
    -DskipTests
    -Dmaven.wagon.http.retryHandler.count=3
    -Dmaven.wagon.httpconnectionManager.ttlSeconds=120

# ── Permissions ──────────────────────────────────────────────────────────────
permissions:
  contents: read
  packages: write
  security-events: write
  actions: read
  id-token: write

jobs:
  # ========================================================================
  # STAGE 1: Build & Test (Zero-Skip — tests MUST pass)
  # ========================================================================
  build-test:
    name: "Build & Test"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Compile (Quick Fail Check)
        run: mvn -B clean compile

      - name: Run All Tests (No Skip)
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/test
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          SPRING_AI_OPENAI_API_KEY: sk-test-placeholder
          TESTCONTAINERS_RYUK_DISABLED: "true"
          TESTCONTAINERS_CHECKS_DISABLE: "true"
        run: mvn -B clean install

      - name: Upload Test Results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: test-results
          path: "**/target/surefire-reports/"
          retention-days: 7

      - name: Upload Build Artifacts (JARs)
        uses: actions/upload-artifact@v5
        if: success()
        with:
          name: build-artifacts
          path: |
            **/target/*.jar
            **/target/*-exec.jar
          retention-days: 3

  # ========================================================================
  # STAGE 2: Build → Scan → Push (single job per service, image never leaves runner)
  # ========================================================================
  # 1. Build with load:true → local tag (module:latest)
  # 2. Trivy scans the local image (blocking — exit-code:1)
  # 3. Only after scan passes: docker tag + docker push to GHCR
  # This eliminates the manifest-unknown race condition AND avoids
  # rebuilding the image a second time just to push.
  # ========================================================================
  build-scan-push:
    name: "Build / Scan / Push — ${{ matrix.module }}"
    runs-on: ubuntu-latest
    needs: [ build-test ]
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        module:
          - gateway
          - auth
          - onboarding
          - core-banking
          - lending
          - cards
          - fraud
          - batch
          - analytics

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Fix Docker Daemon Permissions
        run: sudo chmod 666 /var/run/docker.sock

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── STEP 1: Build (load into local Docker daemon) ──────────────────
      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/${{ matrix.module }}/Dockerfile
          push: false
          load: true
          tags: ${{ matrix.module }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── STEP 2: Security Scan (Trivy on local image) ───────────────────
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ matrix.module }}:latest'
          format: 'sarif'
          output: 'trivy-results-${{ matrix.module }}.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy Results to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results-${{ matrix.module }}.sarif'

      - name: Generate Scan Summary
        if: always()
        run: |
          echo "### Trivy Scan: ${{ matrix.module }}" >> $GITHUB_STEP_SUMMARY
          echo "Image: \`${{ matrix.module }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "Status: Scan completed. Check the Security tab for details." >> $GITHUB_STEP_SUMMARY

      # ── STEP 3: Tag and Push to GHCR (only after Trivy passes) ─────────
      - name: Tag and Push to GHCR
        run: |
          docker tag ${{ matrix.module }}:latest ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-neobank-${{ matrix.module }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-neobank-${{ matrix.module }}:latest
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            docker tag ${{ matrix.module }}:latest ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-neobank-${{ matrix.module }}:${{ github.sha }}
            docker push ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-neobank-${{ matrix.module }}:${{ github.sha }}
          fi

      - name: Push Summary
        run: |
          echo "### Pushed: ${{ matrix.module }}" >> $GITHUB_STEP_SUMMARY
          echo "Registry: \`${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-neobank-${{ matrix.module }}:latest\`" >> $GITHUB_STEP_SUMMARY

  # ========================================================================
  # STAGE 3: Deploy to Environment (MANUAL via workflow_dispatch only)
  # ========================================================================
  # NOTE: This stage is NOT triggered on push/PR. It only runs when you
  # manually dispatch the workflow and select an environment.
  # Requires: KUBE_CONFIG secret (base64-encoded kubeconfig)
  # ========================================================================
  deploy:
    name: "Deploy to ${{ inputs.environment }}"
    runs-on: ubuntu-latest
    needs: [ build-scan-push ]
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 30
    environment:
      name: ${{ inputs.environment }}
      url: https://neobank.example.com

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Configure Kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
        shell: bash

      - name: Apply Kustomize Overlay
        run: |
          echo "Deploying NeoBank services to ${{ inputs.environment }}..."
          kubectl apply -k k8s/overlays/${{ inputs.environment }}

      - name: Wait for Critical Services
        run: |
          echo "Waiting for Auth service to be ready..."
          kubectl rollout status deployment/neobank-auth -n neobank --timeout=300s

          echo "Waiting for Core Banking service to be ready..."
          kubectl rollout status deployment/neobank-core-banking -n neobank --timeout=300s

      - name: Rolling Update Business Modules
        run: |
          SERVICES="neobank-onboarding neobank-lending neobank-cards neobank-fraud neobank-batch neobank-analytics neobank-gateway"
          for svc in $SERVICES; do
            echo "Rolling update: $svc"
            kubectl rollout status deployment/$svc -n neobank --timeout=300s || {
              echo "WARNING: $svc rollout timed out, continuing..."
            }
          done

      - name: Deployment Summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Images:** \`${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-neobank-*:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
