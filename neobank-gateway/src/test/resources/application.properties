# Test Configuration for NeoBank Gateway
spring.application.name=neobank-gateway-test

# Use Ollama for AI during tests (no API key needed)
spring.ai.openai.api-key=test-key-not-needed-with-ollama
spring.ai.openai.base-url=http://localhost:11434

# Disable OpenAI audio/speech for tests
spring.ai.openai.audio.speech.enabled=false
spring.ai.openai.audio.transcription.enabled=false

# Database will be configured by Testcontainers via @DynamicPropertySource
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Logging
logging.level.com.neobank=DEBUG
logging.level.org.testcontainers=INFO

