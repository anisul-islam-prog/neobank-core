# Test Configuration for NeoBank Gateway (WebFlux)
spring.application.name=neobank-gateway-test

# No database needed - gateway is stateless proxy
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# Security (test mode)
neobank.security.cookie.max-age=3600
neobank.security.cookie.domain=localhost

# Downstream services (mock for testing)
neobank.gateway.routes.auth-uri=http://localhost:9081
neobank.gateway.routes.onboarding-uri=http://localhost:9082
neobank.gateway.routes.core-banking-uri=http://localhost:9083
neobank.gateway.routes.lending-uri=http://localhost:9084
neobank.gateway.routes.cards-uri=http://localhost:9085

# JWT configuration (test mode)
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9081
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:9081/.well-known/jwks.json

# Logging
logging.level.com.neobank.gateway=DEBUG
logging.level.org.springframework=INFO
logging.level.org.springframework.security=INFO

# Tracing
management.tracing.enabled=false

# Server
server.port=0
