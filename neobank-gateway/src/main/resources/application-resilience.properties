# =============================================================================
# NeoBank Resilience Configuration - Phase 7
# =============================================================================
# Circuit Breakers, Retries, Bulkheads, and Rate Limiters using Resilience4j
# =============================================================================

# -----------------------------------------------------------------------------
# Circuit Breaker Defaults
# -----------------------------------------------------------------------------
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.configs.default.sliding-window-size=10
resilience4j.circuitbreaker.configs.default.sliding-window-type=count-based
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=5
resilience4j.circuitbreaker.configs.default.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.configs.default.register-failure-rate-exception=true

# -----------------------------------------------------------------------------
# Circuit Breaker: Transfer Service (Critical Path)
# -----------------------------------------------------------------------------
resilience4j.circuitbreaker.instances.transfer.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.transfer.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.transfer.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.transfer.sliding-window-size=10
resilience4j.circuitbreaker.instances.transfer.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.transfer.register-failure-rate-exception=true
resilience4j.circuitbreaker.instances.transfer.record-exceptions=java.net.ConnectException,java.util.concurrent.TimeoutException,org.springframework.dao.CannotAcquireLockException

# -----------------------------------------------------------------------------
# Circuit Breaker: Auth Service (Critical Path)
# -----------------------------------------------------------------------------
resilience4j.circuitbreaker.instances.auth.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.auth.wait-duration-in-open-state=20s
resilience4j.circuitbreaker.instances.auth.permitted-number-of-calls-in-half-open-state=5
resilience4j.circuitbreaker.instances.auth.sliding-window-size=10
resilience4j.circuitbreaker.instances.auth.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.auth.register-failure-rate-exception=true

# -----------------------------------------------------------------------------
# Circuit Breaker: Onboarding Service (Non-Critical Path)
# -----------------------------------------------------------------------------
resilience4j.circuitbreaker.instances.onboarding.failure-rate-threshold=60
resilience4j.circuitbreaker.instances.onboarding.wait-duration-in-open-state=60s
resilience4j.circuitbreaker.instances.onboarding.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.onboarding.sliding-window-size=10
resilience4j.circuitbreaker.instances.onboarding.minimum-number-of-calls=3

# -----------------------------------------------------------------------------
# Circuit Breaker: Analytics Service (Non-Critical Path - Fallback Enabled)
# -----------------------------------------------------------------------------
resilience4j.circuitbreaker.instances.analytics.failure-rate-threshold=40
resilience4j.circuitbreaker.instances.analytics.wait-duration-in-open-state=120s
resilience4j.circuitbreaker.instances.analytics.permitted-number-of-calls-in-half-open-state=1
resilience4j.circuitbreaker.instances.analytics.sliding-window-size=5
resilience4j.circuitbreaker.instances.analytics.minimum-number-of-calls=2
resilience4j.circuitbreaker.instances.analytics.register-failure-rate-exception=true

# -----------------------------------------------------------------------------
# Circuit Breaker: Lending Service
# -----------------------------------------------------------------------------
resilience4j.circuitbreaker.instances.lending.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.lending.wait-duration-in-open-state=45s
resilience4j.circuitbreaker.instances.lending.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.lending.sliding-window-size=10
resilience4j.circuitbreaker.instances.lending.minimum-number-of-calls=5

# -----------------------------------------------------------------------------
# Circuit Breaker: Cards Service
# -----------------------------------------------------------------------------
resilience4j.circuitbreaker.instances.cards.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.cards.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.cards.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.cards.sliding-window-size=10
resilience4j.circuitbreaker.instances.cards.minimum-number-of-calls=5

# -----------------------------------------------------------------------------
# Retry Configuration Defaults
# -----------------------------------------------------------------------------
resilience4j.retry.configs.default.max-attempts=3
resilience4j.retry.configs.default.wait-duration=1s
resilience4j.retry.configs.default.enable-exponential-backoff=true
resilience4j.retry.configs.default.exponential-backoff-multiplier=2
resilience4j.retry.configs.default.max-wait-duration=10s
resilience4j.retry.configs.default.retry-exceptions=java.net.ConnectException,java.util.concurrent.TimeoutException,org.springframework.dao.OptimisticLockingFailureException

# -----------------------------------------------------------------------------
# Retry: Transfer Service (Critical - Aggressive Retry)
# -----------------------------------------------------------------------------
resilience4j.retry.instances.transfer.max-attempts=3
resilience4j.retry.instances.transfer.wait-duration=500ms
resilience4j.retry.instances.transfer.enable-exponential-backoff=true
resilience4j.retry.instances.transfer.exponential-backoff-multiplier=2
resilience4j.retry.instances.transfer.max-wait-duration=5s
resilience4j.retry.instances.transfer.retry-exceptions=java.net.ConnectException,java.util.concurrent.TimeoutException,org.springframework.dao.OptimisticLockingFailureException

# -----------------------------------------------------------------------------
# Retry: Auth Service
# -----------------------------------------------------------------------------
resilience4j.retry.instances.auth.max-attempts=3
resilience4j.retry.instances.auth.wait-duration=500ms
resilience4j.retry.instances.auth.enable-exponential-backoff=true
resilience4j.retry.instances.auth.exponential-backoff-multiplier=2
resilience4j.retry.instances.auth.max-wait-duration=3s

# -----------------------------------------------------------------------------
# Retry: External API Calls (Longer Wait)
# -----------------------------------------------------------------------------
resilience4j.retry.instances.external-api.max-attempts=3
resilience4j.retry.instances.external-api.wait-duration=2s
resilience4j.retry.instances.external-api.enable-exponential-backoff=true
resilience4j.retry.instances.external-api.exponential-backoff-multiplier=2
resilience4j.retry.instances.external-api.max-wait-duration=15s

# -----------------------------------------------------------------------------
# Bulkhead Configuration - Thread Pool Isolation
# -----------------------------------------------------------------------------
# Critical Path: Transfers and Auth get dedicated thread pools
resilience4j.bulkhead.configs.default.max-concurrent-calls=100
resilience4j.bulkhead.configs.default.max-wait-duration=1s

# Critical: Transfer Operations (High Priority)
resilience4j.bulkhead.instances.critical.max-concurrent-calls=50
resilience4j.bulkhead.instances.critical.max-wait-duration=500ms

# Non-Critical: Analytics and BI Reports (Low Priority)
resilience4j.bulkhead.instances.non-critical.max-concurrent-calls=20
resilience4j.bulkhead.instances.non-critical.max-wait-duration=2s

# Bulkhead: Onboarding Operations
resilience4j.bulkhead.instances.onboarding.max-concurrent-calls=30
resilience4j.bulkhead.instances.onboarding.max-wait-duration=1s

# -----------------------------------------------------------------------------
# Rate Limiter Configuration (Module Level)
# -----------------------------------------------------------------------------
resilience4j.ratelimiter.configs.default.limit-for-period=100
resilience4j.ratelimiter.configs.default.limit-refresh-period=1m
resilience4j.ratelimiter.configs.default.timeout-duration=0s

# Rate Limiter: Inter-module Calls
resilience4j.ratelimiter.instances.module-calls.limit-for-period=200
resilience4j.ratelimiter.instances.module-calls.limit-refresh-period=1m
resilience4j.ratelimiter.instances.module-calls.timeout-duration=500ms

# -----------------------------------------------------------------------------
# Thread Pool Configuration for Bulkheads
# -----------------------------------------------------------------------------
# Critical Path Thread Pool
neobank.threadpool.critical.core-size=20
neobank.threadpool.critical.max-size=50
neobank.threadpool.critical.queue-capacity=100
neobank.threadpool.critical.thread-name-prefix=critical-executor-

# Non-Critical Path Thread Pool (BI, Analytics)
neobank.threadpool.non-critical.core-size=5
neobank.threadpool.non-critical.max-size=15
neobank.threadpool.non-critical.queue-capacity=50
neobank.threadpool.non-critical.thread-name-prefix=non-critical-executor-

# -----------------------------------------------------------------------------
# Actuator Endpoints for Resilience4j Monitoring
# -----------------------------------------------------------------------------
management.health.resilience4j.enabled=true
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,metrics,circuitbreakers,bulkheads,ratelimiters,retries
