# =============================================================================
# NeoBank Gateway — Dev Profile
# =============================================================================
# Local-first development config with hot-reload and verbose logging.
# Activate: --spring.profiles.active=dev
# =============================================================================

# DevTools — hot reload on classpath changes
spring.devtools.restart.enabled: true
spring.devtools.livereload.enabled: true

# Local PostgreSQL (started via docker-compose --profile dev)
spring.datasource.url: jdbc:postgresql://localhost:5432/neobank
spring.datasource.username: postgres
spring.datasource.password: postgres
spring.jpa.hibernate.ddl-auto: update
spring.jpa.show-sql: true
spring.jpa.properties.hibernate.format_sql: true

# Liquibase disabled in dev (schema auto-updated by Hibernate)
spring.liquibase.enabled: false

# Verbose logging for debugging
logging.level.com.neobank.gateway: DEBUG
logging.level.org.springframework.cloud.gateway: DEBUG
logging.level.org.springframework.security: DEBUG
logging.level.org.springframework.web: DEBUG
logging.level.io.github.resilience4j: DEBUG
logging.level.root: INFO

# Disable tracing overhead during dev
management.tracing.enabled: false
management.tracing.sampling.probability: 0.0
management.otlp.tracing.endpoint: http://localhost:4318/v1/traces

# Dev-specific gateway routes (all localhost)
neobank.gateway.routes.auth-uri: http://localhost:8081
neobank.gateway.routes.onboarding-uri: http://localhost:8082
neobank.gateway.routes.core-banking-uri: http://localhost:8083
neobank.gateway.routes.lending-uri: http://localhost:8084
neobank.gateway.routes.cards-uri: http://localhost:8085
neobank.gateway.routes.fraud-uri: http://localhost:8086
neobank.gateway.routes.batch-uri: http://localhost:8087
neobank.gateway.routes.analytics-uri: http://localhost:8088

# JWT issuer (local auth service)
spring.security.oauth2.resourceserver.jwt.issuer-uri: http://localhost:8081
spring.security.oauth2.resourceserver.jwt.jwk-set-uri: http://localhost:8081/.well-known/jwks.json
