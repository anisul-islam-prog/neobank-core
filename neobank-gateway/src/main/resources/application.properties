# NeoBank Gateway - Spring Cloud Gateway Configuration
# Reactive API Gateway - Single entry point for all external traffic

# Virtual Threads Configuration (Java 25)
spring.threads.virtual.enabled=true

# Server Configuration
server.port=8080

# Spring Cloud Gateway Route Configuration
# Downstream service URIs (override via environment variables or profiles)
neobank.gateway.routes.auth-uri=http://localhost:8081
neobank.gateway.routes.onboarding-uri=http://localhost:8082
neobank.gateway.routes.core-banking-uri=http://localhost:8083
neobank.gateway.routes.lending-uri=http://localhost:8084
neobank.gateway.routes.cards-uri=http://localhost:8085

# Spring Security OAuth2 Resource Server (JWT)
# Override these for your JWT issuer
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8081
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8081/.well-known/jwks.json

# Cookie Security Configuration
neobank.security.cookie.max-age=3600
neobank.security.cookie.domain=neobank.com

# Resilience4j Circuit Breaker Configuration for Gateway Routes
resilience4j.circuitbreaker.instances.coreBankingCircuitBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.coreBankingCircuitBreaker.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.coreBankingCircuitBreaker.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.coreBankingCircuitBreaker.sliding-window-size=10
resilience4j.circuitbreaker.instances.coreBankingCircuitBreaker.minimum-number-of-calls=5

resilience4j.circuitbreaker.instances.lendingCircuitBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.lendingCircuitBreaker.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.lendingCircuitBreaker.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.lendingCircuitBreaker.sliding-window-size=10
resilience4j.circuitbreaker.instances.lendingCircuitBreaker.minimum-number-of-calls=5

resilience4j.circuitbreaker.instances.cardsCircuitBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.cardsCircuitBreaker.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.cardsCircuitBreaker.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.cardsCircuitBreaker.sliding-window-size=10
resilience4j.circuitbreaker.instances.cardsCircuitBreaker.minimum-number-of-calls=5

# Default Profile (Local for development)
# Override with: -Dspring.profiles.active=prod
spring.profiles.active=local

# Micrometer Tracing for Observability
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://otel-collector:4318/v1/traces
management.endpoints.web.exposure.include=health,info,prometheus,metrics,circuitbreakers,circuitbreakerevents
management.endpoint.health.show-details=always

# Logging
logging.level.com.neobank.gateway=INFO
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.security=DEBUG
