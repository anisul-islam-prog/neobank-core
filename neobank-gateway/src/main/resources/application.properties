# Virtual Threads Configuration (Java 25)
spring.threads.virtual.enabled=true

# PostgreSQL Configuration (for runtime)
spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/neobank}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Database Schema Initialization
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/schema-postgresql.sql

# Spring Modulith Event Registry Configuration
# Events are persisted to event_publication table until successfully processed
spring.modulith.events.republish-outstanding-events-on-restart=true
# Re-submit failed events every 60 seconds
spring.modulith.events.replication.initial-delay=10
spring.modulith.events.replication.period=60

# Resilience4j Circuit Breaker Configuration for Transfers
resilience4j.circuitbreaker.instances.transfer.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.transfer.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.transfer.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.transfer.sliding-window-size=10
resilience4j.circuitbreaker.instances.transfer.sliding-window-type=count-based
resilience4j.circuitbreaker.instances.transfer.minimum-number-of-calls=5
# Fallback enabled - returns "Service Temporarily Unavailable" when circuit is open

# Default Profile (Local/Ollama for development)
# Override with: -Dspring.profiles.active=openai
spring.profiles.active=local

# Micrometer Tracing for AI Token Observability
management.tracing.enabled=true
management.observation.include-key-values=true
