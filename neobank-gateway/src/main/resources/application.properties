# NeoBank Gateway Application Configuration
spring.application.name=neobank-gateway
server.port=8080

# Database Configuration - Gateway uses default schema
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/neobank}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Spring Modulith
spring.modulith.events.republish-outstanding-events-on-restart=true

# Swagger/OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Security
spring.security.filter.order=5

# Observability - Metrics & Tracing
management.endpoints.web.exposure.include=health,info,metrics,prometheus,threaddump,heapdump,env,loggers
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.tracing.sampling.probability=1.0
management.tracing.propagation.type=tracecontext,b3

# OTLP Tracing Export (Tempo)
management.otlp.tracing.endpoint=http://tempo:4318/v1/traces
spring.otlp.tracing.endpoint=http://tempo:4318/v1/traces
