# NeoBank Fraud Detection Service Configuration
# Port: 8085

spring.application.name=neobank-fraud
server.port=8086

# Virtual Threads
spring.threads.virtual.enabled=true

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/neobank}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.default_schema=schema_fraud

# Spring AI - OpenAI for Fraud Analysis
spring.ai.openai.api-key=${OPENAI_API_KEY:sk-placeholder}
spring.ai.openai.chat.model=gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.1

# Spring AI - Ollama (local fallback)
spring.ai.ollama.chat.enabled=false
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=llama3.2

# Resilience4j - Fraud Detection Circuit Breaker
resilience4j.circuitbreaker.instances.fraudDetection.failure-rate-threshold=40
resilience4j.circuitbreaker.instances.fraudDetection.wait-duration-in-open-state=45s
resilience4j.circuitbreaker.instances.fraudDetection.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.fraudDetection.sliding-window-size=10

# Actuator & Observability
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://localhost:4318/v1/traces

# Logging
logging.level.com.neobank.fraud=INFO
logging.level.org.springframework.security=WARN

# Profile
spring.profiles.active=local
