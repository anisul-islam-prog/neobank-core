# =============================================================================
# NeoBank Cards — Deployment
# Card Management Service — Port 8085
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neobank-cards
  namespace: neobank
  labels:
    app.kubernetes.io/name: neobank-cards
    app.kubernetes.io/component: cards
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: neobank-cards
  template:
    metadata:
      labels:
        app.kubernetes.io/name: neobank-cards
        app.kubernetes.io/component: cards
        app.kubernetes.io/part-of: neobank
      annotations:
        kubectl.kubernetes.io/default-container: cards
    spec:
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cards
          image: neobank-cards:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8085
              protocol: TCP
          envFrom:
            - configMapRef:
                name: neobank-config
            - secretRef:
                name: neobank-secrets
          env:
            - name: SERVER_PORT
              value: "8085"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18
