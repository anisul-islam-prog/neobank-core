# =============================================================================
# NeoBank Fraud Detection — Deployment
# AI Fraud Analysis — Port 8086
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neobank-fraud
  namespace: neobank
  labels:
    app.kubernetes.io/name: neobank-fraud
    app.kubernetes.io/component: fraud
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: neobank-fraud
  template:
    metadata:
      labels:
        app.kubernetes.io/name: neobank-fraud
        app.kubernetes.io/component: fraud
        app.kubernetes.io/part-of: neobank
      annotations:
        kubectl.kubernetes.io/default-container: fraud
    spec:
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: fraud
          image: neobank-fraud:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8086
              protocol: TCP
          envFrom:
            - configMapRef:
                name: neobank-config
            - secretRef:
                name: neobank-secrets
          env:
            - name: SERVER_PORT
              value: "8086"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18
