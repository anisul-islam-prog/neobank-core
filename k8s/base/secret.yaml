# =============================================================================
# NeoBank — Secrets Template
# ⚠️  VALUES HERE ARE PLACEHOLDERS.
#     In production, populate via SealedSecrets, External Secrets Operator,
#     or your cloud provider's secret manager.
# =============================================================================
# To generate base64 values:
#   echo -n 'your-secret' | base64
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: neobank-secrets
  namespace: neobank
  labels:
    app.kubernetes.io/part-of: neobank
type: Opaque
stringData:
  # ── Database Credentials ────────────────────────────────────────────
  SPRING_DATASOURCE_USERNAME: "neobank_user"
  SPRING_DATASOURCE_PASSWORD: "ChangeMe_In_Production_123!"

  # ── JWT Secret ──────────────────────────────────────────────────────
  JWT_SECRET: "Replace-With-256-Bit-Random-String-In-Production!"

  # ── OpenAI API Key (for Lending risk assessment & Fraud AI) ────────
  OPENAI_API_KEY: "sk-placeholder-replace-in-production"

  # ── Cookie Security Domain ──────────────────────────────────────────
  NEOBANK_SECURITY_COOKIE_DOMAIN: "neobank.example.com"
