# =============================================================================
# NeoBank Gateway — Service
# Entry point for all external traffic (ClusterIP + Ingress)
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: neobank-gateway
  namespace: neobank
  labels:
    app.kubernetes.io/name: neobank-gateway
    app.kubernetes.io/component: gateway
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    app.kubernetes.io/name: neobank-gateway
