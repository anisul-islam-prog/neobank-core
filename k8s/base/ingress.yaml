# =============================================================================
# NeoBank — Ingress
# Routes all external traffic through the Gateway (port 8080)
# Internal services remain inaccessible from outside (ClusterIP only)
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: neobank-ingress
  namespace: neobank
  labels:
    app.kubernetes.io/part-of: neobank
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - neobank.example.com
        - api.neobank.example.com
      secretName: neobank-tls-secret
  rules:
    - host: neobank.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: neobank-gateway
                port:
                  number: 8080
    - host: api.neobank.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: neobank-gateway
                port:
                  number: 8080
