# =============================================================================
# NeoBank Analytics — Service (Internal ClusterIP)
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: neobank-analytics
  namespace: neobank
  labels:
    app.kubernetes.io/name: neobank-analytics
    app.kubernetes.io/component: analytics
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8088
      targetPort: 8088
      protocol: TCP
  selector:
    app.kubernetes.io/name: neobank-analytics
