# =============================================================================
# NeoBank Auth — Deployment
# Authentication & JWT Service — Port 8081
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neobank-auth
  namespace: neobank
  labels:
    app.kubernetes.io/name: neobank-auth
    app.kubernetes.io/component: auth
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: neobank-auth
  template:
    metadata:
      labels:
        app.kubernetes.io/name: neobank-auth
        app.kubernetes.io/component: auth
        app.kubernetes.io/part-of: neobank
      annotations:
        kubectl.kubernetes.io/default-container: auth
    spec:
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: auth
          image: neobank-auth:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          envFrom:
            - configMapRef:
                name: neobank-config
            - secretRef:
                name: neobank-secrets
          env:
            - name: SERVER_PORT
              value: "8081"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18
