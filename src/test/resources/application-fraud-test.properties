# Fraud Test Configuration
# Control AI provider for fraud detection tests via environment variable

# Set FRAUD_TEST_USE_OPENAI=true to test with OpenAI API
# Set FRAUD_TEST_USE_OPENAI=false (default) to test with local Ollama

# Default: Use Ollama (local) for tests
fraud.test.use.openai=${FRAUD_TEST_USE_OPENAI:false}

# Ollama Configuration (default for tests)
# Points to Ollama running in Docker container
spring.ai.ollama.chat.enabled=true
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.chat.model=llama3.2
spring.ai.ollama.chat.options.temperature=0.3

# OpenAI Configuration (optional for tests)
spring.ai.openai.chat.enabled=${fraud.test.use.openai}
spring.ai.openai.api-key=${OPENAI_API_KEY:test-key}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.3
