# Test configuration for Auth module
spring.datasource.url=jdbc:tc:postgresql:17-alpine:///auth_test
spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver
spring.datasource.username=test
spring.datasource.password=test

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Schema
spring.jpa.properties.hibernate.default_schema=schema_auth

# JWT
jwt.secret=testSecretKeyForDevelopmentMustBe32CharsOrMore
jwt.expiration=3600000
jwt.audience=test

# Logging
logging.level.com.neobank.auth=DEBUG
logging.level.org.testcontainers=INFO
logging.level.org.springframework=INFO
