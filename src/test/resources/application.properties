# Test Profile Configuration

# Enable schema init for tests to create event_publication table
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/schema-postgresql.sql

# Hibernate DDL for tests
spring.jpa.hibernate.ddl-auto=create-drop

# Disable Circuit Breaker for tests
resilience4j.circuitbreaker.enabled=false

# Event Registry - disable republish during tests
spring.modulith.events.republish-outstanding-events-on-restart=false
spring.modulith.events.replication.period=0

# Reduce logging during tests
logging.level.io.github.resilience4j=WARN
logging.level.org.springframework.modulith=WARN
logging.level.org.springframework.security=WARN

# Use local profile for tests with fraud-test overlay
# fraud-test profile controls AI provider via FRAUD_TEST_USE_OPENAI flag
spring.profiles.active=local,fraud-test
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
