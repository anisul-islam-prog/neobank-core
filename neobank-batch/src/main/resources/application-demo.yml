# NeoBank Batch — Demo Profile
spring.datasource.url: jdbc:postgresql://localhost:5432/neobank
spring.datasource.username: postgres
spring.datasource.password: postgres
spring.jpa.hibernate.ddl-auto: update
spring.jpa.show-sql: false
spring.jpa.properties.hibernate.format_sql: true
spring.jpa.properties.hibernate.default_schema: schema_core
spring.liquibase.enabled: false
spring.batch.job.enabled: true
spring.batch.jdbc.initialize-schema: always
logging.level.com.neobank.batch: INFO
logging.level.org.springframework.batch: INFO
logging.level.root: INFO
management.tracing.enabled: true
management.tracing.sampling.probability: 1.0
management.endpoints.web.exposure.include: health,info,prometheus,metrics,batch
management.endpoint.health.show-details: always
neobank.demo.seed.enabled: true
