# NeoBank Batch — Dev Profile
spring.devtools.restart.enabled: true
spring.devtools.livereload.enabled: true
spring.datasource.url: jdbc:postgresql://localhost:5432/neobank
spring.datasource.username: postgres
spring.datasource.password: postgres
spring.jpa.hibernate.ddl-auto: update
spring.jpa.show-sql: true
spring.jpa.properties.hibernate.format_sql: true
spring.jpa.properties.hibernate.default_schema: schema_core
spring.liquibase.enabled: false
# Spring Batch — enable jobs in dev for testing
spring.batch.job.enabled: true
spring.batch.jdbc.initialize-schema: always
logging.level.com.neobank.batch: DEBUG
logging.level.org.springframework.batch: DEBUG
logging.level.root: INFO
management.tracing.enabled: false
