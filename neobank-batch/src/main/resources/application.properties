# NeoBank Batch Processing Service Configuration
# Port: 8086

spring.application.name=neobank-batch
server.port=8087

# Virtual Threads
spring.threads.virtual.enabled=true

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/neobank}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.default_schema=schema_core

# Spring Batch
spring.batch.job.enabled=true
spring.batch.jdbc.initialize-schema=always

# Actuator & Observability
management.endpoints.web.exposure.include=health,info,prometheus,metrics,batch
management.endpoint.health.show-details=always
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://localhost:4318/v1/traces

# Logging
logging.level.com.neobank.batch=INFO
logging.level.org.springframework.batch=INFO

# Profile
spring.profiles.active=local

# Disable Liquibase for local dev
spring.liquibase.enabled=false
