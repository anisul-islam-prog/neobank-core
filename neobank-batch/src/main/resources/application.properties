# NeoBank Batch Module Configuration
spring.application.name=neobank-batch

# Database Schema - schema_batch (for batch logs)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/neobank}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# Batch Configuration
spring.batch.job.enabled=true
spring.batch.job.name=endOfDayJob
spring.batch.jdbc.initialize-schema=always

# Schema for batch metadata tables
spring.batch.jdbc.schema=classpath:org/springframework/batch/core/schema-postgresql.sql

# EOD Job Scheduling (2 AM daily)
neobank.batch.eod.cron=${EOD_CRON:0 0 2 * * *}

# Interest Calculation Configuration
neobank.interest.savings.rate=${SAVINGS_INTEREST_RATE:0.02}
neobank.interest.loan.rate=${LOAN_INTEREST_RATE:0.05}

# Observability — Micrometer & OpenTelemetry
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://otel-collector:4318/v1/traces
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
