# =============================================================================
# NeoBank — Docker Compose
# =============================================================================
# Infrastructure services for local development.
# Backend modules run via Maven (./run-all.sh), not Docker.
#
# Profile Quick Reference:
#   dev   — PostgreSQL only (local-first development)
#   test  — PostgreSQL + Observability stack (integration testing)
#   demo  — PostgreSQL + Ollama + Observability (showcase with seed data)
#
# Usage:
#   docker compose --profile dev up -d
#   docker compose --profile test up -d
#   docker compose --profile demo up -d
# =============================================================================

services:
  # ── PostgreSQL — Required for all profiles ─────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: neobank-postgres
    environment:
      POSTGRES_DB: neobank
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Seed data for demo profile (loaded when PostgreSQL initializes)
      - ./neobank-core-banking/src/main/resources/db/seed-data.sql:/docker-entrypoint-initdb.d/seed-data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Always available across all profiles
    profiles:
      - dev
      - test
      - demo
    networks:
      - neobank-network

  # ── Ollama — AI models for demo/showcase ───────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: neobank-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama ps > /dev/null 2>&1 && ollama run llama3.2 'hello' > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 120s
    profiles:
      - demo
    networks:
      - neobank-network

  # ── Frontend (optional — runs alongside any profile) ───────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: neobank-frontend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://host.docker.internal:8080
      NEXT_PUBLIC_APP_ENV: ${NEXT_PUBLIC_APP_ENV:-development}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    profiles:
      - test
      - demo
    networks:
      - neobank-network

  # ── Prometheus — Metrics (test + demo) ─────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: neobank-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    profiles:
      - test
      - demo
    networks:
      - neobank-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Grafana — Dashboards (test + demo) ─────────────────────────────────
  grafana:
    image: grafana/grafana:11.3.0
    container_name: neobank-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: false
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-piechart-panel
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - tempo
      - loki
    profiles:
      - test
      - demo
    networks:
      - neobank-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Tempo — Distributed Traces (test + demo) ───────────────────────────
  tempo:
    image: grafana/tempo:2.6.1
    container_name: neobank-tempo
    command: ['-config.file=/etc/tempo/tempo.yml']
    ports:
      - "3200:3200"       # Tempo UI
      - "4317:4317"       # OTLP gRPC
      - "4318:4318"       # OTLP HTTP
    volumes:
      - ./observability/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/tmp/tempo
    profiles:
      - test
      - demo
    networks:
      - neobank-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3200/status"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Loki — Log Aggregation (test + demo) ───────────────────────────────
  loki:
    image: grafana/loki:2.9.8
    container_name: neobank-loki
    command: ['-config.file=/etc/loki/loki.yml']
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    profiles:
      - test
      - demo
    networks:
      - neobank-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Promtail — Log Shipper (test + demo) ───────────────────────────────
  promtail:
    image: grafana/promtail:2.9.8
    container_name: neobank-promtail
    command: ['-config.file=/etc/promtail/promtail.yml']
    volumes:
      - ./observability/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/log:/var/log:ro
    depends_on:
      - loki
    profiles:
      - test
      - demo
    networks:
      - neobank-network

networks:
  neobank-network:
    driver: bridge

volumes:
  postgres_data:
  ollama_data:
  prometheus_data:
  grafana_data:
  tempo_data:
  loki_data:
