services:
  postgres:
    image: postgres:17-alpine
    container_name: neobank-postgres
    environment:
      POSTGRES_DB: neobank
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - neobank-network

  ollama:
    image: ollama/ollama:latest
    container_name: neobank-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama ps > /dev/null 2>&1 && ollama run llama3.2 'hello' > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 120s
    profiles:
      - dev
      - test
      - demo
    networks:
      - neobank-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neobank-backend
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
        required: false
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/neobank
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SPRING_AI_OLLAMA_BASE_URL: http://ollama:11434
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      NEOBANK_SEED_DATA: ${NEOBANK_SEED_DATA:-false}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    profiles:
      - test
      - prod
      - demo
    networks:
      - neobank-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: neobank-frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8080
      NEXT_PUBLIC_APP_ENV: ${NEXT_PUBLIC_APP_ENV:-production}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    profiles:
      - test
      - prod
      - demo
    networks:
      - neobank-network

# =============================================================================
# Observability Stack (Prometheus, Grafana, Tempo, Loki)
# =============================================================================

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: neobank-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - backend
    profiles:
      - observability
    networks:
      - neobank-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: grafana/grafana:11.3.0
    container_name: neobank-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: false
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-piechart-panel
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - tempo
      - loki
    profiles:
      - observability
    networks:
      - neobank-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  tempo:
    image: grafana/tempo:2.6.1
    container_name: neobank-tempo
    command: ['-config.file=/etc/tempo/tempo.yml']
    ports:
      - "3200:3200"       # Tempo UI
      - "4317:4317"       # OTLP gRPC
      - "4318:4318"       # OTLP HTTP
    volumes:
      - ./observability/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/tmp/tempo
    profiles:
      - observability
    networks:
      - neobank-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3200/status"]
      interval: 30s
      timeout: 10s
      retries: 3

  loki:
    image: grafana/loki:2.9.8
    container_name: neobank-loki
    command: ['-config.file=/etc/loki/loki.yml']
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    profiles:
      - observability
    networks:
      - neobank-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  promtail:
    image: grafana/promtail:2.9.8
    container_name: neobank-promtail
    command: ['-config.file=/etc/promtail/promtail.yml']
    volumes:
      - ./observability/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/log:/var/log:ro
    depends_on:
      - loki
    profiles:
      - observability
    networks:
      - neobank-network

networks:
  neobank-network:
    driver: bridge

volumes:
  postgres_data:
  ollama_data:
  prometheus_data:
  grafana_data:
  tempo_data:
  loki_data:
