services:
  postgres:
    image: postgres:17-alpine
    container_name: neobank-postgres
    environment:
      POSTGRES_DB: neobank
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - neobank-network

  ollama:
    image: ollama/ollama:latest
    container_name: neobank-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama ps > /dev/null 2>&1 && ollama run llama3.2 'hello' > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 120s
    profiles:
      - dev
      - test
      - demo
    networks:
      - neobank-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neobank-backend
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
        required: false
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/neobank
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SPRING_AI_OLLAMA_BASE_URL: http://ollama:11434
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      NEOBANK_SEED_DATA: ${NEOBANK_SEED_DATA:-false}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    profiles:
      - test
      - prod
      - demo
    networks:
      - neobank-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: neobank-frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8080
      NEXT_PUBLIC_APP_ENV: ${NEXT_PUBLIC_APP_ENV:-production}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    profiles:
      - test
      - prod
      - demo
    networks:
      - neobank-network

networks:
  neobank-network:
    driver: bridge

volumes:
  postgres_data:
  ollama_data:
