# NeoBank Cards Module Configuration
spring.application.name=neobank-cards

# Database Schema - schema_cards
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/neobank}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# Schema-specific configuration
spring.jpa.properties.hibernate.default_schema=schema_cards
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# AES-256 Encryption Key for Card Numbers
neobank.card.encryption.key=${CARD_ENCRYPTION_KEY:change-this-in-production}

# Observability — Micrometer & OpenTelemetry
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://otel-collector:4318/v1/traces
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
