# NeoBank Cards Service Configuration
# Port: 8084

spring.application.name=neobank-cards
server.port=8084

# Virtual Threads
spring.threads.virtual.enabled=true

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/neobank}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.default_schema=schema_cards

# Resilience4j - Card Issuance Circuit Breaker
resilience4j.circuitbreaker.instances.cardIssuance.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.cardIssuance.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.cardIssuance.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.cardIssuance.sliding-window-size=10

# Actuator & Observability
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://localhost:4318/v1/traces

# Logging
logging.level.com.neobank.cards=INFO
logging.level.org.springframework.security=WARN

# Profile
spring.profiles.active=local
