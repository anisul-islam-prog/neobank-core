# Test configuration for Cards module
spring:
  main:
    allow-bean-definition-overriding: true
    autoconfigure:
      exclude:
        - org.springframework.boot.actuate.autoconfigure.metrics.MetricsAutoConfiguration
        - org.springframework.boot.actuate.autoconfigure.micrometer.MicrometerAutoConfiguration
  datasource:
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  sql:
    init:
      mode: always
      data-locations: classpath:init-schema.sql
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        hbm2ddl:
          create_namespaces: true

# Encryption
encryption:
  key: TestEncryptionKey32CharsLong!!

# Disable tracing and metrics export in tests (slim context)
management:
  tracing:
    enabled: false
    sampling:
      probability: 0.0
  metrics:
    export:
      prometheus:
        enabled: false
      otlp:
        enabled: false
  otlp:
    tracing:
      export:
        enabled: false

# Logging
logging:
  level:
    com.neobank.cards: DEBUG
    org.testcontainers: INFO
    org.springframework: INFO
