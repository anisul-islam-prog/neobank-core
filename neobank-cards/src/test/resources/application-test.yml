# Test configuration for Cards module
spring:
  datasource:
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    initialization-mode: always
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        hbm2ddl:
          create_namespaces: true

# Encryption
encryption:
  key: TestEncryptionKey32CharsLong!!

# Disable tracing and metrics export in tests (slim context)
management:
  tracing:
    enabled: false
    sampling:
      probability: 0.0
  metrics:
    export:
      prometheus:
        enabled: false
      otlp:
        enabled: false
  otlp:
    tracing:
      export:
        enabled: false

# Logging
logging:
  level:
    com.neobank.cards: DEBUG
    org.testcontainers: INFO
    org.springframework: INFO
