# NeoBank Core Banking — Demo Profile
spring.datasource.url: jdbc:postgresql://localhost:5432/neobank
spring.datasource.username: postgres
spring.datasource.password: postgres
spring.jpa.hibernate.ddl-auto: update
spring.jpa.show-sql: false
spring.jpa.properties.hibernate.format_sql: true
spring.jpa.properties.hibernate.default_schema: schema_core
spring.liquibase.enabled: false
logging.level.com.neobank.core: INFO
logging.level.root: INFO
management.tracing.enabled: true
management.tracing.sampling.probability: 1.0
management.endpoints.web.exposure.include: health,info,prometheus,metrics
management.endpoint.health.show-details: always
# Demo seed data
neobank.demo.seed.enabled: true
neobank.demo.seed.customers: 50
neobank.demo.seed.transactions: 200
