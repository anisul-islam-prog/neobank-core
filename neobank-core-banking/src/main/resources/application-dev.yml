# NeoBank Core Banking — Dev Profile
spring.devtools.restart.enabled: true
spring.devtools.livereload.enabled: true
spring.datasource.url: jdbc:postgresql://localhost:5432/neobank
spring.datasource.username: postgres
spring.datasource.password: postgres
spring.jpa.hibernate.ddl-auto: update
spring.jpa.show-sql: true
spring.jpa.properties.hibernate.format_sql: true
spring.jpa.properties.hibernate.default_schema: schema_core
spring.liquibase.enabled: false
logging.level.com.neobank.core: DEBUG
logging.level.root: INFO
management.tracing.enabled: false
# Disable circuit breaker overhead in dev
resilience4j.circuitbreaker.instances.transfer.enabled: false
